name: Tests

# Runs the canonical contributor validation lane on every PR targeting `main`.
# The lane matches `docs/developer/contributing.md`:
#
#   uv run --extra dev pytest -q
#   uv run --extra dev python -m build
#   uv run --extra dev python scripts/release_shipability_gate.py --repo .
#
# `pull_request` already fires on PR open, reopen, and every push to the head
# branch (the `synchronize` event), so a separate `push` trigger would just
# double the runs. Post-merge work on `main` is handled by `release.yml`.
#
# Jobs run in parallel:
#   - pytest:   the slow lane (~33s on 4 vCPU)
#   - package:  python -m build + release shipability gate
#   - lint:     ruff (non-blocking until main is green)
#
# All three share a Blacksmith Sticky Disk for the uv wheel cache, so
# dependency installs reuse already-downloaded wheels (~1-2s warm vs ~7s
# cold). The pytest job additionally mounts a cache for .pytest_cache so
# `--ff` orders previously-failing tests first on subsequent pushes,
# delivering signal in seconds when a regression is in flight.
#
# Pytest itself runs through pytest-xdist with `--dist=loadscope` so tests
# in the same module/class stay on the same worker (the suite has
# class-level os.environ patching and tempdir fixtures that break under
# load-balancing). `-n 4` matches the runner tier, keeping behavior
# reproducible regardless of host core count.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Mount uv cache (Sticky Disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: envctl-uv-cache
          path: /home/runner/.cache/uv

      - name: Mount pytest cache (Sticky Disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: envctl-pytest-cache
          path: /home/runner/.cache/envctl-pytest

      - name: Checkout
        uses: actions/checkout@v6

      - name: Link pytest cache into workspace
        run: |
          set -euo pipefail
          mkdir -p /home/runner/.cache/envctl-pytest
          rm -rf .pytest_cache
          ln -s /home/runner/.cache/envctl-pytest .pytest_cache

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Sync dev environment
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: uv sync --extra dev --python 3.12

      - name: Run pytest
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: |
          uv run --extra dev pytest -q \
            -n 4 --dist=loadscope \
            --maxfail=25 \
            --ff \
            --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/junit.xml
          if-no-files-found: warn
          retention-days: 14

  package:
    name: build & shipability
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Mount uv cache (Sticky Disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: envctl-uv-cache
          path: /home/runner/.cache/uv

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Sync dev environment
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: uv sync --extra dev --python 3.12

      - name: Build wheel and sdist
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: uv run --extra dev python -m build

      - name: Release shipability gate
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: uv run --extra dev python scripts/release_shipability_gate.py --repo .

  lint:
    name: ruff
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Lint is advisory until main is green. Failures still appear in the PR
    # checks so contributors see signal, but they do not block the gate.
    continue-on-error: true
    steps:
      - name: Mount uv cache (Sticky Disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: envctl-uv-cache
          path: /home/runner/.cache/uv

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install ruff
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: uv tool install --quiet ruff

      - name: Run ruff
        run: uv tool run ruff check python tests scripts
