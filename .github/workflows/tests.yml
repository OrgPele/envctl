name: Tests

# Runs the canonical contributor validation lane on every PR targeting `main`.
# The lane matches `docs/developer/contributing.md`:
#
#   uv run --extra dev pytest -q
#   uv run --extra dev python -m build
#   uv run --extra dev python scripts/release_shipability_gate.py --repo .
#
# `pull_request` already fires on PR open, reopen, and every push to the head
# branch (the `synchronize` event), so a separate `push` trigger would just
# double the runs. Post-merge work on `main` is handled by `release.yml`.
#
# Jobs run in parallel:
#   - pytest:   the slow lane
#   - package:  python -m build + release shipability gate
#   - lint:     ruff (non-blocking until main is green)
#
# All three restore uv's cache through GitHub's official cache action keyed by
# uv.lock so dependency installs reuse already-downloaded wheels without relying
# on a third-party setup/cache action. The pytest job additionally restores
# .pytest_cache so `--ff` orders previously-failing tests first on subsequent
# pushes, delivering signal in seconds when a regression is in flight.
#
# Pytest itself runs through pytest-xdist with `--dist=loadscope` so tests
# in the same module/class stay on the same worker (the suite has
# class-level os.environ patching and tempdir fixtures that break under
# load-balancing). `-n 4` matches the runner tier, keeping behavior
# reproducible regardless of host core count.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  UV_CACHE_DIR: /home/runner/.cache/uv

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/uv
          key: envctl-uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            envctl-uv-${{ runner.os }}-

      - name: Restore pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: envctl-pytest-${{ runner.os }}-${{ github.event.pull_request.number || github.ref }}
          restore-keys: |
            envctl-pytest-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dev environment
        run: uv sync --extra dev --python 3.12

      - name: Run pytest
        run: |
          uv run --extra dev pytest -q \
            -n 4 --dist=loadscope \
            --maxfail=25 \
            --ff \
            --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/junit.xml
          if-no-files-found: warn
          retention-days: 14

  package:
    name: build & shipability
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/uv
          key: envctl-uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            envctl-uv-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dev environment
        run: uv sync --extra dev --python 3.12

      - name: Build wheel and sdist
        run: uv run --extra dev python -m build

      - name: Release shipability gate
        run: uv run --extra dev python scripts/release_shipability_gate.py --repo .

  lint:
    name: ruff
    runs-on: ubuntu-24.04
    # Lint is advisory until main is green. Failures still appear in the PR
    # checks so contributors see signal, but they do not block the gate.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/uv
          key: envctl-uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            envctl-uv-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install ruff
        run: uv tool install --quiet ruff

      - name: Run ruff
        run: uv tool run ruff check python tests scripts
