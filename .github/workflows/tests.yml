name: Tests

# Runs the canonical contributor validation lane on every PR targeting `main`.
# The lane matches `docs/developer/contributing.md`:
#
#   .venv/bin/python -m pytest -q
#   .venv/bin/python -m build
#   .venv/bin/python scripts/release_shipability_gate.py --repo .
#
# `pull_request` already fires on PR open, reopen, and every push to the head
# branch (the `synchronize` event), so a separate `push` trigger would just
# double the runs. Post-merge work on `main` is handled by `release.yml`.
#
# Pytest runs through pytest-xdist with `--dist=loadscope` so tests in the
# same module/class stay on the same worker (the suite has class-level
# os.environ patching and tempdir fixtures that break under load-balancing).
# `-n 4` matches the runner tier, keeping behavior reproducible regardless of
# the host core count.
#
# Dependency install uses `uv` (3-7x faster than pip) with its package cache
# mounted from a Blacksmith Sticky Disk so warm runs reuse already-built
# wheels instead of redownloading on every job. JUnit XML is emitted so
# Blacksmith Test Analytics can pick up failures and surface flakes.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Mount uv cache (Sticky Disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: envctl-uv-cache
          path: /home/runner/.cache/uv

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Create venv and install dev extras
        env:
          UV_CACHE_DIR: /home/runner/.cache/uv
        run: |
          set -euo pipefail
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: Run pytest
        run: |
          .venv/bin/python -m pytest -q \
            -n 4 --dist=loadscope \
            --maxfail=25 \
            --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/junit.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Build wheel and sdist
        run: .venv/bin/python -m build

      - name: Release shipability gate
        run: .venv/bin/python scripts/release_shipability_gate.py --repo .
