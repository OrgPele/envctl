name: Release publish

# Watches `pyproject.toml` on `main`. When the version bumps and no matching
# tag exists yet, builds the wheel + sdist, tags `v<version>`, and creates a
# GitHub Release using `docs/changelog/RELEASE_NOTES_<version>.md` as the body.
#
# Pair with `release-prepare.yml`, which is responsible for staging the bump
# and notes from a source PR body.

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version to publish (defaults to pyproject.toml on main)."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        env:
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            version="$OVERRIDE"
          else
            version=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode()).get('project',{}).get('version',''))")
          fi
          if [ -z "$version" ]; then
            echo "::error::could not determine version" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists; nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release notes file exists
        if: steps.tag_check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes="docs/changelog/RELEASE_NOTES_${VERSION}.md"
          if [ ! -f "$notes" ]; then
            echo "::error::missing release notes file: $notes" >&2
            exit 1
          fi
          echo "Using release notes: $notes"

      - name: Build wheel and sdist
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist

      - name: Create tag
        if: steps.tag_check.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "envctl ${TAG}"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "envctl ${VERSION}" \
            --notes-file "docs/changelog/RELEASE_NOTES_${VERSION}.md" \
            dist/*
