name: Release

# Protected-main release flow:
#
#   1. A manual dispatch computes the next version, generates release notes,
#      updates release metadata, and opens a release PR from
#      `release/envctl-<version>`.
#   2. Repository rules merge that version bump through the normal PR path.
#   3. When that release PR is merged, this workflow builds artifacts from
#      `main`, tags `<version>`, and creates the GitHub Release with the
#      checked-in release notes file.
#
# Trigger from the Actions tab to prepare the release PR. Publish happens after
# that PR is merged.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump applied to the current pyproject version."
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit MAJOR.MINOR.PATCH version (overrides bump)."
        required: false
        type: string
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Sync validation environment
        run: uv sync --extra dev --python 3.12

      - name: Release shipability gate
        run: uv run --extra dev python scripts/release_shipability_gate.py --repo .

      - name: Resolve previous and next versions
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          previous=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ -n "${OVERRIDE:-}" ]; then
            new=$(python scripts/prepare_release.py compute-version --version "$OVERRIDE")
          else
            new=$(python scripts/prepare_release.py compute-version --bump "${BUMP:-patch}")
          fi

          previous_tag=""
          if git rev-parse -q --verify "refs/tags/${previous}" >/dev/null; then
            previous_tag="$previous"
          elif git rev-parse -q --verify "refs/tags/v${previous}" >/dev/null; then
            previous_tag="v${previous}"
          fi

          if git rev-parse -q --verify "refs/tags/${new}" >/dev/null; then
            echo "::error::tag ${new} already exists; pick a different version" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v${new}" >/dev/null; then
            echo "::error::tag v${new} already exists; pick a different version" >&2
            exit 1
          fi

          {
            echo "previous=$previous"
            echo "previous_tag=$previous_tag"
            echo "new=$new"
            echo "tag=$new"
          } >> "$GITHUB_OUTPUT"
          echo "Preparing ${previous} -> ${new} (previous tag: ${previous_tag:-<none>})"

      - name: Generate release notes from merged PRs
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          set -euo pipefail
          mkdir -p .release-tmp
          release_notes="docs/changelog/RELEASE_NOTES_${NEW_VERSION}.md"
          if [ -s "$release_notes" ]; then
            cp "$release_notes" .release-tmp/notes-body.md
            echo "--- checked-in release notes preview ---"
            head -n 40 .release-tmp/notes-body.md || true
            exit 0
          fi

          payload=".release-tmp/notes-payload.json"
          if [ -n "${PREVIOUS_TAG}" ]; then
            jq -n --arg tag "$NEW_VERSION" --arg target "main" --arg prev "$PREVIOUS_TAG" \
              '{tag_name: $tag, target_commitish: $target, previous_tag_name: $prev}' > "$payload"
          else
            jq -n --arg tag "$NEW_VERSION" --arg target "main" \
              '{tag_name: $tag, target_commitish: $target}' > "$payload"
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            --input "$payload" \
            > .release-tmp/notes-response.json

          jq -r '.body' .release-tmp/notes-response.json > .release-tmp/notes-body.md

          if [ ! -s .release-tmp/notes-body.md ]; then
            echo "_No merged pull requests detected since the previous release._" > .release-tmp/notes-body.md
          fi

          echo "--- generated notes preview ---"
          head -n 40 .release-tmp/notes-body.md || true

      - name: Apply version bump and write release notes
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            python scripts/prepare_release.py apply \
              --version "$OVERRIDE" \
              --notes-body-file .release-tmp/notes-body.md
          else
            python scripts/prepare_release.py apply \
              --bump "${BUMP:-patch}" \
              --notes-body-file .release-tmp/notes-body.md
          fi

      - name: Build release artifacts for validation
        run: |
          set -euo pipefail
          rm -rf dist build ./*.egg-info
          uv run --extra dev python -m build --wheel --sdist

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.ENVCTL_RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          set -euo pipefail
          branch="release/envctl-${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add pyproject.toml README.md "docs/changelog/RELEASE_NOTES_${NEW_VERSION}.md"

          if git diff --cached --quiet; then
            echo "::error::release preparation produced no version metadata changes" >&2
            exit 1
          fi

          git commit -m "Release envctl ${NEW_VERSION}"
          git push --force-with-lease origin "$branch"

          body=".release-tmp/release-pr-body.md"
          {
            echo "## Summary"
            echo "- Release envctl ${NEW_VERSION}."
            echo "- Update pyproject metadata, README badges, and release notes."
            echo
            echo "## Validation"
            echo "- uv run --extra dev python scripts/release_shipability_gate.py --repo ."
            echo "- uv run --extra dev python -m build --wheel --sdist"
            echo
            echo "## Publish"
            echo "Merging this PR triggers the Release workflow publish job, which tags ${NEW_VERSION} and creates the GitHub Release."
          } > "$body"

          existing_url=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open --json url --jq '.[0].url // ""')
          if [ -n "$existing_url" ]; then
            if gh pr edit "$existing_url" --title "Release envctl ${NEW_VERSION}" --body-file "$body"; then
              echo "Release PR already exists: $existing_url"
            else
              echo "::warning::release branch was pushed, but the workflow token could not update the existing release PR: $existing_url" >&2
              echo "::notice::configure ENVCTL_RELEASE_PR_TOKEN with contents:write and pull_requests:write, or update the release PR manually." >&2
              {
                echo "### Manual release PR update required"
                echo
                echo "Release branch pushed: \`$branch\`"
                echo
                echo "Existing release PR: $existing_url"
                echo
                echo "Configure \`ENVCTL_RELEASE_PR_TOKEN\` with contents and pull-request write permissions to let this workflow update release PRs automatically."
              } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
            fi
          else
            create_output="$(
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base main \
                --head "$branch" \
                --title "Release envctl ${NEW_VERSION}" \
                --body-file "$body" 2>&1
            )" && create_status=0 || create_status=$?
            if [ "$create_status" -eq 0 ]; then
              echo "$create_output"
            elif echo "$create_output" | grep -qi "not permitted to create.*pull requests"; then
              manual_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
              echo "::warning::release branch was pushed, but this repository does not permit GitHub Actions to create pull requests with the configured token." >&2
              echo "::notice::open the release PR manually from ${manual_url}, or configure ENVCTL_RELEASE_PR_TOKEN with contents:write and pull_requests:write." >&2
              {
                echo "### Manual release PR creation required"
                echo
                echo "Release branch pushed: \`$branch\`"
                echo
                echo "Open the release PR manually: $manual_url"
                echo
                echo "Configure \`ENVCTL_RELEASE_PR_TOKEN\` with contents and pull-request write permissions to let this workflow create release PRs automatically."
              } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
            else
              echo "$create_output" >&2
              exit "$create_status"
            fi
          fi

  publish:
    name: publish merged release
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/envctl-')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Sync validation environment
        run: uv sync --extra dev --python 3.12

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          version=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          notes="docs/changelog/RELEASE_NOTES_${version}.md"
          if [ ! -s "$notes" ]; then
            echo "::error::release notes file is missing or empty: $notes" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "::notice::tag ${version} already exists; skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Release shipability gate
        if: steps.release.outputs.publish == 'true'
        run: uv run --extra dev python scripts/release_shipability_gate.py --repo .

      - name: Build wheel and sdist
        if: steps.release.outputs.publish == 'true'
        run: |
          set -euo pipefail
          rm -rf dist build ./*.egg-info
          uv run --extra dev python -m build --wheel --sdist

      - name: Create tag
        if: steps.release.outputs.publish == 'true'
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_VERSION" -m "envctl ${NEW_VERSION}"
          git push origin "$NEW_VERSION"

      - name: Create GitHub Release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.release.outputs.version }}
          NOTES_FILE: ${{ steps.release.outputs.notes }}
        run: |
          set -euo pipefail
          gh release create "$NEW_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "envctl ${NEW_VERSION}" \
            --notes-file "$NOTES_FILE" \
            dist/*
