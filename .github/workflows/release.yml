name: Release

# Manual release flow:
#
#   1. A manual dispatch computes the next version, generates release notes, and
#      updates release metadata.
#   2. The workflow validates once, commits the release metadata directly to
#      `main`, tags that commit, and creates the GitHub Release with artifacts.
#
# Repository rules must allow this workflow token to push release commits to
# `main`. No release PR or approval step is used.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump applied to the current pyproject version."
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit MAJOR.MINOR.PATCH version (overrides bump)."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: build and publish release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ENVCTL_RELEASE_TOKEN || secrets.ENVCTL_RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Sync validation environment
        run: uv sync --extra dev --python 3.12

      - name: Release shipability gate
        run: uv run --extra dev python scripts/release_shipability_gate.py --repo .

      - name: Resolve previous and next versions
        id: version
        env:
          GH_TOKEN: ${{ secrets.ENVCTL_RELEASE_TOKEN || secrets.ENVCTL_RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          previous=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ -n "${OVERRIDE:-}" ]; then
            new=$(python scripts/prepare_release.py compute-version --version "$OVERRIDE")
          else
            new=$(python scripts/prepare_release.py compute-version --bump "${BUMP:-patch}")
          fi

          previous_tag=""
          if git rev-parse -q --verify "refs/tags/${previous}" >/dev/null; then
            previous_tag="$previous"
          elif git rev-parse -q --verify "refs/tags/v${previous}" >/dev/null; then
            previous_tag="v${previous}"
          fi

          tag_exists=false
          if git rev-parse -q --verify "refs/tags/${new}" >/dev/null; then
            if gh release view "$new" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "::error::release ${new} already exists; pick a different version" >&2
              exit 1
            fi
            tag_exists=true
          fi
          if git rev-parse -q --verify "refs/tags/v${new}" >/dev/null; then
            echo "::error::tag v${new} already exists; pick a different version" >&2
            exit 1
          fi

          {
            echo "previous=$previous"
            echo "previous_tag=$previous_tag"
            echo "new=$new"
            echo "tag=$new"
            echo "tag_exists=$tag_exists"
          } >> "$GITHUB_OUTPUT"
          echo "Preparing ${previous} -> ${new} (previous tag: ${previous_tag:-<none>})"

      - name: Generate release notes from merged PRs
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          set -euo pipefail
          mkdir -p .release-tmp
          release_notes="docs/changelog/RELEASE_NOTES_${NEW_VERSION}.md"
          if [ -s "$release_notes" ]; then
            cp "$release_notes" .release-tmp/notes-body.md
            echo "--- checked-in release notes preview ---"
            head -n 40 .release-tmp/notes-body.md || true
            exit 0
          fi

          payload=".release-tmp/notes-payload.json"
          if [ -n "${PREVIOUS_TAG}" ]; then
            jq -n --arg tag "$NEW_VERSION" --arg target "main" --arg prev "$PREVIOUS_TAG" \
              '{tag_name: $tag, target_commitish: $target, previous_tag_name: $prev}' > "$payload"
          else
            jq -n --arg tag "$NEW_VERSION" --arg target "main" \
              '{tag_name: $tag, target_commitish: $target}' > "$payload"
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            --input "$payload" \
            > .release-tmp/notes-response.json

          jq -r '.body' .release-tmp/notes-response.json > .release-tmp/notes-body.md

          if [ ! -s .release-tmp/notes-body.md ]; then
            echo "_No merged pull requests detected since the previous release._" > .release-tmp/notes-body.md
          fi

          echo "--- generated notes preview ---"
          head -n 40 .release-tmp/notes-body.md || true

      - name: Apply version bump and write release notes
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            python scripts/prepare_release.py apply \
              --version "$OVERRIDE" \
              --notes-body-file .release-tmp/notes-body.md
          else
            python scripts/prepare_release.py apply \
              --bump "${BUMP:-patch}" \
              --notes-body-file .release-tmp/notes-body.md
          fi

      - name: Build release artifacts
        run: |
          set -euo pipefail
          rm -rf dist build ./*.egg-info
          uv run --extra dev python -m build --wheel --sdist

      - name: Commit, tag, and publish release
        env:
          GH_TOKEN: ${{ secrets.ENVCTL_RELEASE_TOKEN || secrets.ENVCTL_RELEASE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          TAG_EXISTS: ${{ steps.version.outputs.tag_exists }}
        run: |
          set -euo pipefail
          notes="docs/changelog/RELEASE_NOTES_${NEW_VERSION}.md"
          if [ ! -s "$notes" ]; then
            echo "::error::release notes file is missing or empty: $notes" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml README.md "$notes"

          if git diff --cached --quiet; then
            current=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
            if [ "$current" != "$NEW_VERSION" ]; then
              echo "::error::release preparation produced no version metadata changes" >&2
              exit 1
            fi
            echo "::notice::release metadata is already committed for ${NEW_VERSION}; continuing"
          else
            git commit -m "Release envctl ${NEW_VERSION}"
            git push origin "HEAD:main"
          fi

          if [ "${TAG_EXISTS:-false}" != "true" ]; then
            git tag -a "$NEW_VERSION" -m "envctl ${NEW_VERSION}"
            git push origin "$NEW_VERSION"
          fi

          gh release create "$NEW_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "envctl ${NEW_VERSION}" \
            --notes-file "$notes" \
            dist/*
