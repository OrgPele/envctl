[meta]
schema_version = 1

[policies.orphan_detection]
# codegraph's default orphan detector is useful for routed TS apps, but this
# repo is a Python CLI with pytest entry points and many externally invoked
# command handlers. Keep structural graph checks enabled and avoid failing the
# gate on Python symbols that are intentionally reached outside static calls.
enabled = false

[[suppress]]
policy = "coupling_ceiling"
key = "python/envctl_engine/actions/action_command_orchestrator.py"
reason = "Existing command router composes target discovery, execution, summaries, and rerun support; tracked as a known refactor candidate outside this validation config change."

[[suppress]]
policy = "coupling_ceiling"
key = "python/envctl_engine/runtime/engine_runtime.py"
reason = "Existing runtime facade intentionally coordinates broad lifecycle, state, action, and diagnostic services; splitting it is outside this validation config change."

[[suppress]]
policy = "coupling_ceiling"
key = "python/envctl_engine/startup/startup_orchestrator.py"
reason = "Existing startup orchestrator integrates dependency bootstrap, service launch, readiness, and dashboard handoff; tracked as known architecture debt."

[[suppress]]
policy = "coupling_ceiling"
key = "python/envctl_engine/ui/dashboard/orchestrator.py"
reason = "Existing dashboard orchestrator bridges runtime control, status rendering, and selector flows; suppress the current baseline while keeping the coupling policy active for new files."
