services:
  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.3.0}
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:${N8N_PORT:-5678}}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:${N8N_PORT:-5678}/}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-envctl-local-n8n-key}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-UTC}
      TZ: ${N8N_TIMEZONE:-UTC}
      DB_TYPE: sqlite
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
